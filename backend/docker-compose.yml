services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: verazoi
      POSTGRES_PASSWORD: verazoi
      POSTGRES_DB: verazoi
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./migrations/002_features.sql:/docker-entrypoint-initdb.d/002_features.sql
      - ./migrations/003_security.sql:/docker-entrypoint-initdb.d/003_security.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verazoi"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
