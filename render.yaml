services:
  - type: web
    name: verazoi-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python migrate.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: verazoi-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: verazoi-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://aktanazat.github.io
      - key: ENV
        value: production
      - key: ANTHROPIC_API_KEY
        sync: false
  - type: redis
    name: verazoi-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  - name: verazoi-db
    plan: free
    databaseName: verazoi
    user: verazoi
